search:
  default_type: hybrid
  hybrid:
    strategies:
      vector:
        weight: 0.4
      graph:
        weight: 0.3
      lexical:
        weight: 0.3
    fusion: reciprocal_rank
    rrf_k: 60
    top_k: 20
  reranking:
    enabled: true
    model: bge-reranker-v2-m3
    top_k: 10
    fallback: llm

  # Document routing: two-stage retrieval for large datasets
  # Stage 1 selects top-K relevant documents via DocumentIndexCard vectors
  # Stage 2 filters KD/DC search to only those documents
  # Automatically skipped for small datasets (≤ min_doc_count)
  document_routing:
    enabled: true
    min_doc_count: 5          # Enable routing for datasets with >5 documents
    top_k: 3                 # Max documents to select in Stage 1
    llm_candidate_limit: 10  # Only send top-N vector matches to LLM router (reduces noise)
    confidence_threshold: 0.3 # Activate routing if best card score < this
    score_gap: 0.10          # Only include docs within this distance of best match (tighter = more single-doc)
    kd_routing_boost: 0.8    # Score bonus for KD from routed documents (higher = stronger preference)
    consistency_bonus: 0.40   # Bonus per sibling KD from same document in pool (higher = more doc-focused)

  # Post-generation claim verification: checks answer against context
  # Catches hallucinated numbers/facts that prompt rules missed
  verification:
    enabled: true
    max_retries: 1            # Max re-generation attempts if ungrounded claims found
